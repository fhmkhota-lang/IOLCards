<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>IOL Cards — Social Card Studio</title>
  <link rel="icon" href="iol-logo-dark.png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- HEADER -->
  <header class="hdr">
    <div class="hdr-inner">
      <div class="hdr-brand">
        <img src="iol-logo-white.png" alt="IOL" class="hdr-logo"/>
        <div class="hdr-text">
          <span class="hdr-title">Cards</span>
          <span class="hdr-sub">Social Card Studio</span>
        </div>
      </div>
      <div class="hdr-right">
        <div class="live-badge"><span class="live-dot"></span>LIVE</div>
        <span class="feed-status" id="feed-status"></span>
        <button class="icon-btn" id="refresh-btn" title="Refresh feed">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M13.65 2.35A8 8 0 1 0 15 8h-2a6 6 0 1 1-1.22-3.65L9 7h6V1l-1.35 1.35Z" fill="currentColor"/></svg>
        </button>
      </div>
    </div>
  </header>

  <!-- FILTER BAR -->
  <div class="filter-bar">
    <div class="filter-inner">
      <div class="cat-pills" id="cat-pills">
        <button class="cpill active" data-cat="all">All</button>
        <button class="cpill" data-cat="news">News</button>
        <button class="cpill" data-cat="politics">Politics</button>
        <button class="cpill" data-cat="sport">Sport</button>
        <button class="cpill" data-cat="business">Business</button>
        <button class="cpill" data-cat="leisure">Leisure</button>
        <button class="cpill" data-cat="technology">Technology</button>
        <button class="cpill" data-cat="motoring">Motoring</button>
      </div>
    </div>
  </div>

  <!-- FEED -->
  <main class="feed">
    <div class="grid" id="stories-grid">
      <div class="grid-loading">
        <div class="spinner"></div>
        <p>Loading latest IOL stories…</p>
      </div>
    </div>
    <div class="load-more-row" id="load-more-row" style="display:none">
      <button class="load-more-btn" id="load-more-btn">Load more</button>
    </div>
  </main>

  <!-- ═══════════════ CARD DESIGNER OVERLAY ═══════════════ -->
  <div class="designer" id="designer">
    <div class="designer-inner">

      <!-- Designer nav bar -->
      <div class="dnav">
        <button class="back-btn" id="back-btn">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M11 4L6 9L11 14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Back
        </button>
        <div class="dnav-title" id="dnav-title"></div>
        <div class="dnav-actions">
          <button class="btn-download" id="btn-dl">⬇ Download Card</button>
          <button class="btn-download btn-dl-all" id="btn-dl-all" style="display:none">⬇ All Slides</button>
        </div>
      </div>

      <!-- Designer body: canvas + controls -->
      <div class="dbody">

        <!-- ── LEFT: Preview ── -->
        <div class="canvas-area">

          <!-- Card type switcher -->
          <div class="type-toggle" id="type-toggle">
            <button class="tt-btn active" data-type="single">Single Card</button>
            <button class="tt-btn" data-type="carousel">Carousel</button>
          </div>

          <!-- Canvas -->
          <div class="canvas-frame">
            <canvas id="card-canvas" title="Drag to reposition · Scroll to zoom"></canvas>
          </div>

          <!-- Image tools row -->
          <div class="img-toolbar">
            <span class="itb-label">Image</span>
            <button class="itb-btn" id="itb-zoom-in" title="Zoom in">+</button>
            <button class="itb-btn" id="itb-zoom-out" title="Zoom out">−</button>
            <button class="itb-btn" id="itb-reset" title="Reset">⊙</button>
            <div class="itb-sep"></div>
            <span class="itb-hint">Drag canvas to reposition · Scroll to zoom</span>
          </div>

          <!-- Carousel controls -->
          <div class="carousel-bar" id="carousel-bar" style="display:none">
            <button class="cb-btn" id="c-prev">← Prev</button>
            <span class="cb-indicator" id="c-indicator">Slide 1/1</span>
            <button class="cb-btn" id="c-next">Next →</button>
            <button class="cb-btn cb-add" id="c-add">+ Add Slide</button>
            <button class="cb-btn cb-del" id="c-del">✕ Delete</button>
          </div>
        </div>

        <!-- ── RIGHT: Controls ── -->
        <div class="controls">

          <div class="ctrl-block">
            <div class="ctrl-label">Category</div>
            <select class="ctrl-select" id="ctrl-cat">
              <option value="news">News</option>
              <option value="politics">Politics</option>
              <option value="sport">Sport</option>
              <option value="business">Business</option>
              <option value="technology">Technology</option>
              <option value="entertainment">Entertainment</option>
              <option value="motoring">Motoring</option>
              <option value="lifestyle">Lifestyle</option>
              <option value="travel">Travel</option>
            </select>
          </div>

          <div class="ctrl-block">
            <div class="ctrl-label">Kicker <span class="ctrl-sub">Short bold label (top-left box)</span></div>
            <input class="ctrl-input" id="ctrl-kicker" type="text" maxlength="40" placeholder="e.g. BREAKING NEWS"/>
          </div>

          <div class="ctrl-block">
            <div class="ctrl-label">Headline</div>
            <textarea class="ctrl-ta" id="ctrl-headline" rows="3" placeholder="Story headline…"></textarea>
          </div>

          <div class="ctrl-block">
            <div class="ctrl-label">Caption <span class="ctrl-sub">Key fact or quote</span></div>
            <textarea class="ctrl-ta" id="ctrl-caption" rows="2" placeholder="Supporting detail…"></textarea>
          </div>

          <div class="ctrl-block">
            <div class="ctrl-label">Text Position</div>
            <div class="pos-grid" id="pos-grid">
              <button class="pos-btn" data-pos="top">↑ Top</button>
              <button class="pos-btn active" data-pos="mid">● Middle</button>
              <button class="pos-btn" data-pos="bot">↓ Bottom</button>
            </div>
          </div>

          <div class="ctrl-block">
            <div class="ctrl-label">Story Image URL</div>
            <div class="img-url-row">
              <input class="ctrl-input" id="ctrl-imgurl" placeholder="https://iol-prod.appspot.com/image/…"/>
              <button class="reload-btn" id="ctrl-reload" title="Reload image">↺</button>
            </div>
          </div>

          <div class="ctrl-block">
            <div class="ctrl-label-row">
              <span class="ctrl-label">Share Text</span>
              <button class="copy-btn" id="copy-share-btn">Copy</button>
            </div>
            <textarea class="ctrl-ta ctrl-share" id="ctrl-share" rows="6" placeholder="Share text will appear here…" spellcheck="false"></textarea>
          </div>

        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
